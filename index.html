<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動學習與模擬平台</title>
    
    <!-- 載入 Tailwind CSS (排版樣式) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 載入 FontAwesome (網頁圖示) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 載入 React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 載入 Babel (讓瀏覽器能即時編譯 JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 載入 3D 引擎 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans selection:bg-blue-200 overflow-x-hidden">
    <!-- React 應用程式掛載點 -->
    <div id="root"></div>

    <!-- 主程式邏輯 (使用 Babel 編譯) -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 模擬賽事組件 (3v3 AI 對戰 + 終極戰術版) ---
        const AutoDroneSimulator = () => {
          const containerRef = useRef(null);

          const [score, setScore] = useState({ blue: 0, red: 0 });
          const [status, setStatus] = useState('賽事準備中...');
          const [timeLeft, setTimeLeft] = useState(180); 
          const [chaosMode, setChaosMode] = useState(false);
          const [boxStyle, setBoxStyle] = useState(null);
          const [cameraView, setCameraView] = useState('referee');
          
          const [isSimPaused, setIsSimPaused] = useState(false);
          const [windEnabled, setWindEnabled] = useState(false);
          const [aiAggro, setAiAggro] = useState(50); 

          const matchOverRef = useRef(false);
          const chaosModeRef = useRef(false);
          const cameraViewRef = useRef('referee');
          const isSimPausedRef = useRef(false);
          const windEnabledRef = useRef(false);
          const aiAggroRef = useRef(50);
          
          const keysRef = useRef({});

          const selectionState = useRef({
            isSelecting: false,
            startX: 0, startY: 0,
            isDragging: false,
            dragPlaneY: 0,
            offsets: new Map() 
          });

          useEffect(() => {
            chaosModeRef.current = chaosMode;
            if (chaosMode) setStatus('⚠️ 警告：已啟動違規飛行模式！AI 開始無差別亂飛！');
            else setStatus('賽事進行中...');
          }, [chaosMode]);

          useEffect(() => { cameraViewRef.current = cameraView; }, [cameraView]);
          useEffect(() => { isSimPausedRef.current = isSimPaused; }, [isSimPaused]);
          useEffect(() => { windEnabledRef.current = windEnabled; }, [windEnabled]);
          useEffect(() => { aiAggroRef.current = aiAggro; }, [aiAggro]);

          useEffect(() => {
            const timerId = setInterval(() => {
              if (isSimPausedRef.current) return;

              setTimeLeft(prev => {
                if (prev <= 1) {
                  clearInterval(timerId);
                  matchOverRef.current = true;
                  setStatus('比賽結束！');
                  return 0;
                }
                return prev - 1;
              });
            }, 1000);

            const handleKeyDown = (e) => { 
              keysRef.current[e.code] = true; 
              if (e.code === 'Space') {
                 e.preventDefault();
                 setIsSimPaused(prev => !prev);
              }
            };
            const handleKeyUp = (e) => { keysRef.current[e.code] = false; };
            
            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);

            return () => {
              clearInterval(timerId);
              window.removeEventListener('keydown', handleKeyDown);
              window.removeEventListener('keyup', handleKeyUp);
            };
          }, []);

          const formatTime = (seconds) => {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
          };

          useEffect(() => {
            if (!containerRef.current) return;

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf1f5f9);
            scene.fog = new THREE.Fog(0xf1f5f9, 20, 100);
            
            const initialWidth = containerRef.current.clientWidth || 800;
            const initialHeight = containerRef.current.clientHeight || 600;
            const camera = new THREE.PerspectiveCamera(50, initialWidth / initialHeight, 0.1, 1000);
            
            camera.position.set(24, 12, 0);
            camera.lookAt(0, 3, 0); 
            const currentLookTarget = new THREE.Vector3(0, 3, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(initialWidth, initialHeight);
            renderer.shadowMap.enabled = true;
            containerRef.current.appendChild(renderer.domElement);

            const resizeObserver = new ResizeObserver(() => {
              if (!containerRef.current) return;
              const width = containerRef.current.clientWidth;
              const height = containerRef.current.clientHeight;
              if (width > 0 && height > 0) {
                camera.aspect = width / height;
                camera.updateProjectionMatrix();
                renderer.setSize(width, height);
              }
            });
            resizeObserver.observe(containerRef.current);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
            scene.add(hemiLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(5, 20, 15);
            dirLight.castShadow = true;
            scene.add(dirLight);

            const arenaSize = { w: 20, h: 10, d: 30 };
            const floor = new THREE.Mesh(
              new THREE.PlaneGeometry(arenaSize.w, arenaSize.d), 
              new THREE.MeshStandardMaterial({ color: 0xe2e8f0, roughness: 0.8, metalness: 0.1 })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);
            
            const centerLine = new THREE.Mesh(new THREE.PlaneGeometry(arenaSize.w, 0.2), new THREE.MeshBasicMaterial({ color: 0x94a3b8, transparent: true, opacity: 0.6 }));
            centerLine.rotation.x = -Math.PI / 2;
            centerLine.position.y = 0.02;
            scene.add(centerLine);

            const centerCircle = new THREE.Mesh(new THREE.RingGeometry(2.8, 3.0, 32), new THREE.MeshBasicMaterial({ color: 0x94a3b8, transparent: true, opacity: 0.6, side: THREE.DoubleSide }));
            centerCircle.rotation.x = -Math.PI / 2;
            centerCircle.position.y = 0.02;
            scene.add(centerCircle);

            const grid = new THREE.GridHelper(30, 30, 0x94a3b8, 0xcbd5e1);
            grid.position.y = 0.01;
            scene.add(grid);

            const wallGeo = new THREE.BoxGeometry(arenaSize.w, 8, arenaSize.d);
            const wallMat = new THREE.MeshPhysicalMaterial({ color: 0x88ccff, transparent: true, opacity: 0.08, side: THREE.BackSide });
            const walls = new THREE.Mesh(wallGeo, wallMat);
            walls.position.y = 4;
            scene.add(walls);

            // 隔離籠
            const cageContainer = new THREE.Group();
            const cageEdges = new THREE.EdgesGeometry(new THREE.BoxGeometry(5, 5, 5));
            const cageLineMat = new THREE.LineBasicMaterial({ color: 0xf59e0b, linewidth: 2 });
            cageContainer.add(new THREE.LineSegments(cageEdges, cageLineMat));
            const cageMat = new THREE.MeshBasicMaterial({ color: 0xf59e0b, transparent: true, opacity: 0.08 });
            cageContainer.add(new THREE.Mesh(new THREE.BoxGeometry(5, 5, 5), cageMat));
            cageContainer.position.set(-7.5, 2.5, -12.5); 
            scene.add(cageContainer);

            const createGoal = (posZ, color, team) => {
              const group = new THREE.Group();
              
              const hoopMat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.8, transparent: true, opacity: 1 });
              const hoop = new THREE.Mesh(new THREE.TorusGeometry(1.8, 0.15, 16, 100), hoopMat);
              hoop.position.y = 3.5;
              hoop.castShadow = true;
              group.add(hoop);
              
              const standMat = new THREE.MeshStandardMaterial({ color: 0x475569, metalness: 0.6, transparent: true, opacity: 1 });
              const stand = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 3.5), standMat);
              stand.position.y = 1.75;
              stand.castShadow = true;
              group.add(stand);
              
              const zoneMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.15 });
              const zone = new THREE.Mesh(new THREE.CircleGeometry(2.2, 32), zoneMat);
              zone.rotation.x = -Math.PI/2;
              zone.position.y = 0.02;
              group.add(zone);
              
              group.position.z = posZ;
              group.userData = { team, materials: { hoopMat, standMat, zoneMat } };
              return group;
            };
            
            const redGoal = createGoal(13, 0xdc2626, 'red');
            const blueGoal = createGoal(-13, 0x2563eb, 'blue');
            scene.add(redGoal, blueGoal);

            const maxParticles = 500;
            const particlesGeo = new THREE.BufferGeometry();
            const particlesPos = new Float32Array(maxParticles * 3);
            const particlesVel = [];
            const particlesLife = new Float32Array(maxParticles);
            
            particlesGeo.setAttribute('position', new THREE.BufferAttribute(particlesPos, 3));
            const particlesMat = new THREE.PointsMaterial({ color: 0xfacc15, size: 0.2, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
            const particleSystem = new THREE.Points(particlesGeo, particlesMat);
            scene.add(particleSystem);

            let pIndex = 0;
            const spawnSparks = (position, intensity = 1.0, colorHex = 0xfacc15) => {
               particlesMat.color.setHex(colorHex);
               const count = Math.min(20 * intensity, 50);
               for(let i=0; i<count; i++) {
                  const idx = pIndex % maxParticles;
                  particlesPos[idx*3] = position.x;
                  particlesPos[idx*3+1] = position.y;
                  particlesPos[idx*3+2] = position.z;
                  
                  particlesVel[idx] = new THREE.Vector3(
                     (Math.random() - 0.5) * 10 * intensity,
                     (Math.random() - 0.2) * 10 * intensity, 
                     (Math.random() - 0.5) * 10 * intensity
                  );
                  particlesLife[idx] = 1.0; 
                  pIndex++;
               }
            };

            const windLines = new THREE.Group();
            const windLineMat = new THREE.LineBasicMaterial({ color: 0x94a3b8, transparent: true, opacity: 0.3 });
            for(let i=0; i<20; i++) {
               const points = [new THREE.Vector3(0,0,0), new THREE.Vector3(-2, 0, 0)];
               const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), windLineMat);
               line.position.set((Math.random()-0.5)*20, Math.random()*8, (Math.random()-0.5)*30);
               windLines.add(line);
            }
            scene.add(windLines);

            const dronesData = [
              { id: 'r_s', team: 'red', role: 'striker', pos: new THREE.Vector3(0, 1, 8), vel: new THREE.Vector3(), rot: 0, color: 0xdc2626, isRetreating: false, retreatDir: 1, isSelected: false, isDragged: false, inCage: false, trail: [] },
              { id: 'r_d1', team: 'red', role: 'defender', pos: new THREE.Vector3(-4, 1, 10), vel: new THREE.Vector3(), rot: 0, color: 0xdc2626, isRetreating: false, isSelected: false, isDragged: false, inCage: false, trail: [] },
              { id: 'r_d2', team: 'red', role: 'defender', pos: new THREE.Vector3(4, 1, 10), vel: new THREE.Vector3(), rot: 0, color: 0xdc2626, isRetreating: false, isSelected: false, isDragged: false, inCage: false, trail: [] },
              { id: 'b_s', team: 'blue', role: 'striker', pos: new THREE.Vector3(0, 1, -8), vel: new THREE.Vector3(), rot: 0, color: 0x2563eb, isRetreating: false, retreatDir: 1, isSelected: false, isDragged: false, inCage: false, trail: [] },
              { id: 'b_d1', team: 'blue', role: 'defender', pos: new THREE.Vector3(-4, 1, -10), vel: new THREE.Vector3(), rot: 0, color: 0x2563eb, isRetreating: false, isSelected: false, isDragged: false, inCage: false, trail: [] },
              { id: 'b_d2', team: 'blue', role: 'defender', pos: new THREE.Vector3(4, 1, -10), vel: new THREE.Vector3(), rot: 0, color: 0x2563eb, isRetreating: false, isSelected: false, isDragged: false, inCage: false, trail: [] },
            ];

            const createDroneMesh = (drone) => {
              const group = new THREE.Group();
              group.rotation.order = 'YXZ'; 
              
              const cageGeo = new THREE.IcosahedronGeometry(0.5, 2);
              const cageEdges = new THREE.EdgesGeometry(cageGeo);
              const cage = new THREE.LineSegments(cageEdges, new THREE.LineBasicMaterial({ color: drone.color, linewidth: 2 }));
              group.add(cage);
              
              const core = new THREE.Mesh(
                new THREE.BoxGeometry(0.3, 0.1, 0.3), 
                new THREE.MeshStandardMaterial({ color: 0x334155 })
              );
              group.add(core);

              const headGroup = new THREE.Group();
              const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.15, 16, 16), 
                new THREE.MeshStandardMaterial({ color: 0xfacc15, emissive: 0xfacc15, emissiveIntensity: 0.4 })
              );
              head.position.z = -0.25; 
              headGroup.add(head);

              const nose = new THREE.Mesh(
                new THREE.ConeGeometry(0.08, 0.2, 4), 
                new THREE.MeshStandardMaterial({ color: 0xfacc15 })
              );
              nose.rotation.x = -Math.PI / 2;
              nose.position.z = -0.35;
              headGroup.add(nose);
              group.add(headGroup);

              const arrowGroup = new THREE.Group();
              const arrowMat = new THREE.MeshBasicMaterial({ color: 0x10b981 }); 
              const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.6), arrowMat);
              shaft.rotation.x = Math.PI / 2;
              shaft.position.z = -0.3; 
              const aHead = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.25, 8), arrowMat);
              aHead.rotation.x = -Math.PI / 2;
              aHead.position.z = -0.7; 
              arrowGroup.add(shaft, aHead);
              arrowGroup.position.y = 0.65;
              group.add(arrowGroup);
              
              if (drone.role === 'striker') {
                 const ribbonGeo = new THREE.PlaneGeometry(0.15, 1.5);
                 ribbonGeo.translate(0, -0.75, 0); 
                 const ribbonMat = new THREE.MeshBasicMaterial({ color: 0xfacc15, side: THREE.DoubleSide });
                 const ribbon = new THREE.Mesh(ribbonGeo, ribbonMat);
                 ribbon.position.set(0, -0.4, 0); 
                 group.add(ribbon);
                 
                 drone.trailLine = new THREE.Line(
                    new THREE.BufferGeometry(),
                    new THREE.LineBasicMaterial({ color: drone.color, transparent: true, opacity: 0.5, linewidth: 2 })
                 );
                 scene.add(drone.trailLine);
              }

              const selectionRing = new THREE.Mesh(
                new THREE.RingGeometry(0.6, 0.7, 32),
                new THREE.MeshBasicMaterial({ color: 0x38bdf8, side: THREE.DoubleSide, transparent: true, opacity: 0.9 })
              );
              selectionRing.rotation.x = -Math.PI / 2;
              selectionRing.position.y = -0.4;
              selectionRing.visible = false;
              group.add(selectionRing);
              drone.selectionRing = selectionRing;

              const tailLight = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.06, 0.06), new THREE.MeshBasicMaterial({ color: drone.color }));
              tailLight.position.set(0, 0, 0.25);
              group.add(tailLight);

              group.castShadow = true;
              return group;
            };

            dronesData.forEach(d => {
               d.mesh = createDroneMesh(d);
               d.mesh.position.copy(d.pos);
               scene.add(d.mesh);
            });

            const raycaster = new THREE.Raycaster();
            
            const onPointerDown = (e) => {
              if (!containerRef.current) return;
              const rect = containerRef.current.getBoundingClientRect();
              const mouseX = e.clientX - rect.left;
              const mouseY = e.clientY - rect.top;
              const ndcX = (mouseX / rect.width) * 2 - 1;
              const ndcY = -(mouseY / rect.height) * 2 + 1;

              raycaster.setFromCamera(new THREE.Vector2(ndcX, ndcY), camera);
              const droneMeshes = dronesData.map(d => d.mesh);
              const intersects = raycaster.intersectObjects(droneMeshes, true);

              if (intersects.length > 0) {
                let obj = intersects[0].object;
                while (obj.parent && !dronesData.find(d => d.mesh === obj)) obj = obj.parent;
                const clickedDrone = dronesData.find(d => d.mesh === obj);

                if (clickedDrone) {
                  if (!clickedDrone.isSelected) {
                    dronesData.forEach(d => d.isSelected = false);
                    clickedDrone.isSelected = true;
                  }
                  selectionState.current.isDragging = true;
                  selectionState.current.dragPlaneY = clickedDrone.pos.y;
                  
                  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -clickedDrone.pos.y);
                  const hitPoint = new THREE.Vector3();
                  raycaster.ray.intersectPlane(plane, hitPoint);
                  
                  selectionState.current.offsets.clear();
                  dronesData.forEach(d => {
                    if (d.isSelected) {
                      d.isDragged = true;
                      selectionState.current.offsets.set(d.id, d.pos.clone().sub(hitPoint));
                    }
                  });
                  containerRef.current.style.cursor = 'grabbing';
                }
              } else {
                dronesData.forEach(d => d.isSelected = false);
                selectionState.current.isSelecting = true;
                selectionState.current.startX = mouseX;
                selectionState.current.startY = mouseY;
                setBoxStyle({ left: mouseX, top: mouseY, width: 0, height: 0 });
              }
            };

            const onPointerMove = (e) => {
              if (!containerRef.current) return;
              const rect = containerRef.current.getBoundingClientRect();
              const mouseX = e.clientX - rect.left;
              const mouseY = e.clientY - rect.top;

              if (selectionState.current.isSelecting) {
                setBoxStyle({
                  left: Math.min(startX, mouseX),
                  top: Math.min(startY, mouseY),
                  width: Math.abs(mouseX - startX),
                  height: Math.abs(mouseY - startY)
                });
              } else if (selectionState.current.isDragging) {
                const ndcX = (mouseX / rect.width) * 2 - 1;
                const ndcY = -(mouseY / rect.height) * 2 + 1;
                raycaster.setFromCamera(new THREE.Vector2(ndcX, ndcY), camera);
                
                const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -selectionState.current.dragPlaneY);
                const hitPoint = new THREE.Vector3();
                
                if (raycaster.ray.intersectPlane(plane, hitPoint)) {
                  dronesData.forEach(d => {
                    if (d.isSelected && d.isDragged) {
                      const offset = selectionState.current.offsets.get(d.id);
                      d.pos.copy(hitPoint).add(offset);
                      d.pos.x = THREE.MathUtils.clamp(d.pos.x, -9.5, 9.5);
                      d.pos.z = THREE.MathUtils.clamp(d.pos.z, -14.5, 14.5);
                      d.vel.set(0, 0, 0); 
                    }
                  });
                }
              }
            };

            const onPointerUp = (e) => {
              if (selectionState.current.isSelecting) {
                selectionState.current.isSelecting = false;
                setBoxStyle(null);
                
                if (!containerRef.current) return;
                const rect = containerRef.current.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                const minX = Math.min(selectionState.current.startX, mouseX);
                const maxX = Math.max(selectionState.current.startX, mouseX);
                const minY = Math.min(selectionState.current.startY, mouseY);
                const maxY = Math.max(selectionState.current.startY, mouseY);

                dronesData.forEach(d => {
                  const screenPos = d.pos.clone().project(camera);
                  const px = (screenPos.x + 1) / 2 * rect.width;
                  const py = -(screenPos.y - 1) / 2 * rect.height;
                  if (px >= minX && px <= maxX && py >= minY && py <= maxY) {
                    d.isSelected = true;
                  }
                });
              }

              if (selectionState.current.isDragging) {
                selectionState.current.isDragging = false;
                
                dronesData.forEach(d => {
                  if (d.isDragged) {
                     if (d.pos.x > -10.0 && d.pos.x < -5.0 && 
                         d.pos.y > 0.0 && d.pos.y < 5.0 && 
                         d.pos.z > -15.0 && d.pos.z < -10.0) {
                         d.inCage = true;
                     } else {
                         d.inCage = false;
                     }
                  }
                  d.isDragged = false;
                });

                selectionState.current.offsets.clear();
                if (containerRef.current) containerRef.current.style.cursor = 'crosshair';
              }
            };

            if (containerRef.current) {
              containerRef.current.addEventListener('pointerdown', onPointerDown);
            }
            window.addEventListener('pointermove', onPointerMove);
            window.addEventListener('pointerup', onPointerUp);

            let lastTime = performance.now();
            let animationFrameId;

            const animate = () => {
              const now = performance.now();
              const dt = Math.min((now - lastTime) / 1000, 0.1);
              lastTime = now;

              if (matchOverRef.current) {
                renderer.render(scene, camera);
                animationFrameId = requestAnimationFrame(animate);
                return;
              }

              const isPaused = isSimPausedRef.current;

              let targetCamPos = new THREE.Vector3();
              let targetLookAt = new THREE.Vector3();
              if (cameraViewRef.current === 'referee') {
                targetCamPos.set(24, 12, 0);
                targetLookAt.set(0, 3, 0);
              } else if (cameraViewRef.current === 'blue') {
                targetCamPos.set(0, 8, -26);
                targetLookAt.set(0, 3, 2);
              } else if (cameraViewRef.current === 'red') {
                targetCamPos.set(0, 8, 26);
                targetLookAt.set(0, 3, -2);
              }
              camera.position.lerp(targetCamPos, 0.05);
              currentLookTarget.lerp(targetLookAt, 0.05);
              camera.lookAt(currentLookTarget);

              [redGoal, blueGoal].forEach(goal => {
                 const team = goal.userData.team;
                 const isOwnGoal = cameraViewRef.current === team; 
                 const targetOpacity = isOwnGoal ? 0.1 : 1.0; 
                 const targetZoneOpacity = isOwnGoal ? 0.05 : 0.15;

                 goal.userData.materials.hoopMat.opacity = THREE.MathUtils.lerp(goal.userData.materials.hoopMat.opacity, targetOpacity, 0.1);
                 goal.userData.materials.standMat.opacity = THREE.MathUtils.lerp(goal.userData.materials.standMat.opacity, targetOpacity, 0.1);
                 goal.userData.materials.zoneMat.opacity = THREE.MathUtils.lerp(goal.userData.materials.zoneMat.opacity, targetZoneOpacity, 0.1);
              });

              const isWind = windEnabledRef.current;
              windLines.visible = isWind;
              if (isWind && !isPaused) {
                 windLines.children.forEach(line => {
                    line.position.x -= 15 * dt;
                    if (line.position.x < -15) line.position.x = 15;
                 });
              }

              const isChaos = chaosModeRef.current;
              const aggro = aiAggroRef.current; 
              const selectedCount = dronesData.filter(d => d.isSelected).length;
              const allowManualOverride = (selectedCount === 1 && !selectionState.current.isSelecting);

              let isHoveringCage = false;
              if (selectionState.current.isDragging) {
                 dronesData.forEach(d => {
                    if (d.isDragged && d.pos.x > -10.0 && d.pos.x < -5.0 && d.pos.y > 0.0 && d.pos.y < 5.0 && d.pos.z > -15.0 && d.pos.z < -10.0) {
                       isHoveringCage = true;
                    }
                 });
              }
              
              if (isHoveringCage) {
                  cageMat.color.setHex(0x10b981); cageMat.opacity = 0.3; cageLineMat.color.setHex(0x10b981);
              } else {
                  cageMat.color.setHex(0xf59e0b); cageMat.opacity = 0.08; cageLineMat.color.setHex(0xf59e0b);
              }

              if (!isPaused) {
                const positions = particleSystem.geometry.attributes.position.array;
                for(let i=0; i<maxParticles; i++) {
                   if(particlesLife[i] > 0) {
                      particlesLife[i] -= dt * 2.0; 
                      if(particlesLife[i] <= 0) {
                         positions[i*3] = 999; 
                      } else {
                         positions[i*3] += particlesVel[i].x * dt;
                         positions[i*3+1] += particlesVel[i].y * dt;
                         particlesVel[i].y -= 9.8 * dt; 
                         positions[i*3+2] += particlesVel[i].z * dt;
                      }
                   }
                }
                particleSystem.geometry.attributes.position.needsUpdate = true;

                dronesData.forEach(drone => {
                  if (drone.isSelected) {
                    drone.mesh.scale.set(1.15, 1.15, 1.15);
                    if (drone.selectionRing) drone.selectionRing.visible = true;
                  } else {
                    drone.mesh.scale.set(1, 1, 1);
                    if (drone.selectionRing) drone.selectionRing.visible = false;
                  }

                  if (drone.isDragged) {
                    drone.mesh.position.copy(drone.pos);
                    drone.vel.set(0,0,0);
                    return;
                  }

                  if (drone.isRetreating) {
                      if ((drone.team === 'red' && drone.pos.z > 0.5) || (drone.team === 'blue' && drone.pos.z < -0.5)) {
                          drone.isRetreating = false; 
                      }
                  }

                  let steer = new THREE.Vector3();
                  const maxSpeed = drone.role === 'striker' ? 14 : (8 + (aggro / 100) * 4); 
                  const maxForce = 45;

                  if (drone.isSelected && allowManualOverride) {
                      const acc = new THREE.Vector3(0, -9.8, 0); 
                      const rotationSpeed = 3.5, thrustPower = 35.0, tiltPower = 20.0; 

                      if (keysRef.current['KeyW']) acc.y += thrustPower;
                      if (keysRef.current['KeyS']) acc.y -= 5;
                      if (keysRef.current['KeyA']) drone.rot += rotationSpeed * dt;
                      if (keysRef.current['KeyD']) drone.rot -= rotationSpeed * dt;

                      let moveDir = new THREE.Vector3(0, 0, 0);
                      let targetPitch = 0;
                      let targetRoll = 0;

                      if (keysRef.current['KeyI']) { moveDir.z -= Math.cos(drone.rot); moveDir.x -= Math.sin(drone.rot); targetPitch = 0.45; }
                      else if (keysRef.current['KeyK']) { moveDir.z += Math.cos(drone.rot); moveDir.x += Math.sin(drone.rot); targetPitch = -0.45; }
                      
                      if (keysRef.current['KeyJ']) { moveDir.x -= Math.cos(drone.rot); moveDir.z += Math.sin(drone.rot); targetRoll = 0.45; }
                      else if (keysRef.current['KeyL']) { moveDir.x += Math.cos(drone.rot); moveDir.z -= Math.sin(drone.rot); targetRoll = -0.45; }

                      acc.add(moveDir.multiplyScalar(tiltPower));
                      drone.vel.add(acc.multiplyScalar(dt));

                      drone.mesh.rotation.y = drone.rot;
                      drone.mesh.rotation.x = THREE.MathUtils.lerp(drone.mesh.rotation.x, targetPitch, 0.15);
                      drone.mesh.rotation.z = THREE.MathUtils.lerp(drone.mesh.rotation.z, targetRoll, 0.15);

                  } else {
                      const oppGoalZ = drone.team === 'red' ? -13 : 13;
                      const ownGoalZ = drone.team === 'red' ? 13 : -13;
                      const oppStriker = dronesData.find(d => d.team !== drone.team && d.role === 'striker');
                      let target = new THREE.Vector3();
                      
                      if (drone.inCage) {
                          target.set(
                             -7.5 + Math.sin(now * 0.002 + drone.id.length) * 2, 
                             2.5 + Math.cos(now * 0.003 + drone.id.length) * 1.5, 
                             -12.5 + Math.sin(now * 0.001 + drone.id.length) * 2
                          );
                      } else if (isChaos) {
                          if (drone.role === 'striker') {
                              target.set(Math.sin(now * 0.005) * 5, 3.5, ownGoalZ); 
                          } else {
                              target.set(
                                 Math.sin(now * 0.002 + drone.id.length) * 12, 
                                 Math.sin(now * 0.003) * 8 + 4, 
                                 Math.cos(now * 0.002) * 15
                              ); 
                          }
                      } else {
                          if (drone.role === 'striker') {
                              if (drone.isRetreating) {
                                  target.set(12 * drone.retreatDir, 5, ownGoalZ * 0.5);
                              } else {
                                  target.set(0, 3.5, oppGoalZ + (drone.team === 'red' ? -2 : 2));
                                  const distZ = Math.abs(drone.pos.z - oppGoalZ);
                                  const wobbleFactor = Math.min(1, distZ / 10);
                                  target.x += Math.sin(now * 0.003 + drone.pos.z) * 4 * wobbleFactor; 
                              }
                          } else {
                              const forwardOffset = drone.team === 'red' ? -3.0 : 3.0;
                              const sideOffset = drone.id.includes('d1') ? -2.5 : 2.5;
                              
                              const driftX = Math.sin(now * 0.0015 + drone.pos.z) * 3;
                              const driftY = Math.cos(now * 0.002 + drone.pos.x) * 1.5;
                              const driftZ = Math.sin(now * 0.001 + drone.id.length) * 1.5;

                              const baseTarget = new THREE.Vector3(sideOffset + driftX, 3.5 + driftY, ownGoalZ + forwardOffset + driftZ);
                              
                              if (aggro > 10 && oppStriker && !oppStriker.isRetreating) {
                                 const distToStriker = drone.pos.distanceTo(oppStriker.pos);
                                 if (distToStriker < (5 + (aggro/100)*5)) {
                                    baseTarget.lerp(oppStriker.pos, aggro / 100);
                                 }
                              }
                              target.copy(baseTarget);
                          }
                      }

                      let desired = target.clone().sub(drone.pos);
                      if (desired.lengthSq() > 0.0001) {
                          desired.normalize().multiplyScalar(maxSpeed);
                          steer.add(desired.clone().sub(drone.vel));
                      }

                      let sepForce = new THREE.Vector3();
                      let count = 0;
                      dronesData.forEach(other => {
                          if (drone.id !== other.id && !other.isDragged) {
                              const d = drone.pos.distanceTo(other.pos);
                              if (d > 0.001 && d < 2.0) {
                                  let push = drone.pos.clone().sub(other.pos).normalize().divideScalar(d);
                                  sepForce.add(push);
                                  count++;
                                  
                                  const relVel = drone.vel.clone().sub(other.vel).length();
                                  if (d < 1.0 && relVel > 8) {
                                     const midPoint = drone.pos.clone().add(other.pos).multiplyScalar(0.5);
                                     spawnSparks(midPoint, relVel / 20); 
                                  }
                              }
                          }
                      });
                      if (count > 0) {
                          sepForce.divideScalar(count);
                          if (sepForce.lengthSq() > 0.0001) {
                              sepForce.normalize().multiplyScalar(maxSpeed * 1.5);
                              steer.add(sepForce);
                          }
                      }

                      if (isWind) steer.x -= 15; 

                      if (!drone.inCage) {
                         if (Math.abs(drone.pos.x) > 8) steer.x -= Math.sign(drone.pos.x) * 15;
                         if (drone.pos.y > 7) steer.y -= 15;
                         if (drone.pos.y < 1.5) steer.y += 15;
                      }

                      steer.clampLength(0, maxForce);
                      drone.vel.add(steer.multiplyScalar(dt));

                      if (drone.vel.lengthSq() > 0.1) {
                          const heading = Math.atan2(-drone.vel.x, -drone.vel.z);
                          drone.mesh.rotation.y = heading;
                          drone.rot = heading; 
                          const speed = drone.vel.length();
                          drone.mesh.rotation.x = speed * 0.05; 
                      }
                  }

                  drone.vel.multiplyScalar(0.96); 
                  drone.pos.add(drone.vel.clone().multiplyScalar(dt));

                  const handleWallBounce = (axis, limit, isMin) => {
                     const v = drone.pos[axis];
                     if ((isMin && v < limit) || (!isMin && v > limit)) {
                        drone.pos[axis] = limit;
                        if (Math.abs(drone.vel[axis]) > 5) spawnSparks(drone.pos, Math.abs(drone.vel[axis])/15, 0x60a5fa); 
                        drone.vel[axis] *= -0.5;
                     }
                  };

                  if (drone.inCage) {
                      handleWallBounce('y', 0.5, true); handleWallBounce('y', 4.5, false);
                      handleWallBounce('x', -9.5, true); handleWallBounce('x', -5.5, false);
                      handleWallBounce('z', -14.5, true); handleWallBounce('z', -10.5, false);
                  } else {
                      handleWallBounce('y', 0.5, true);
                      handleWallBounce('x', -9.5, true); handleWallBounce('x', 9.5, false);
                      handleWallBounce('z', -14.5, true); handleWallBounce('z', 14.5, false);
                  }

                  drone.mesh.position.copy(drone.pos);

                  if (drone.role === 'striker' && drone.trailLine) {
                     drone.trail.push(drone.pos.clone());
                     if (drone.trail.length > 40) drone.trail.shift(); 
                     drone.trailLine.geometry.setFromPoints(drone.trail);
                  }

                  if (drone.role === 'striker' && !drone.isRetreating && !isChaos && !drone.inCage) {
                     const oppGoalZ = drone.team === 'red' ? -13 : 13;
                     const distToGoalXY = Math.hypot(drone.pos.x, drone.pos.y - 3.5);
                     const isBehindGoalLine = drone.team === 'red' ? (drone.pos.z < -13.5) : (drone.pos.z > 13.5);

                     if (isBehindGoalLine && distToGoalXY < 2.0) {
                         setScore(prev => ({ ...prev, [drone.team]: prev[drone.team] + 1 }));
                         drone.retreatDir = Math.random() > 0.5 ? 1 : -1; 
                         drone.isRetreating = true; 
                         drone.mesh.scale.set(1.4, 1.4, 1.4);
                         setTimeout(() => { if (!drone.isSelected) drone.mesh.scale.set(1, 1, 1); }, 300);
                     }
                  }
        });
      } // End of !isPaused

      renderer.render(scene, camera);
      animationFrameId = requestAnimationFrame(animate);
    };

    animate();

    return () => {
      window.removeEventListener('keydown', handleKeyDown);
      window.removeEventListener('keyup', handleKeyUp);
      cancelAnimationFrame(animationFrameId);
      resizeObserver.disconnect();
      if (containerRef.current) {
        containerRef.current.removeEventListener('pointerdown', onPointerDown);
        containerRef.current.removeChild(renderer.domElement);
      }
      window.removeEventListener('pointermove', onPointerMove);
      window.removeEventListener('pointerup', onPointerUp);
    };
  }, []);

  return (
    <div className="relative w-full h-[650px] bg-slate-100 rounded-xl overflow-hidden border border-slate-300 shadow-2xl">
       <div ref={containerRef} className="w-full h-full cursor-crosshair select-none touch-none" />
       
       {boxStyle && (
         <div 
           className="absolute border border-blue-500 bg-blue-500/20 pointer-events-none z-10"
           style={{ left: boxStyle.left, top: boxStyle.top, width: boxStyle.width, height: boxStyle.height }}
         />
       )}

       <div className="absolute top-6 left-6 z-10 flex flex-col gap-2 pointer-events-auto">
          <div className="bg-white/90 backdrop-blur-md p-2 rounded-2xl border border-slate-200 shadow-sm flex flex-col gap-1">
             <button onClick={() => setCameraView('referee')} className={`px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all flex items-center gap-2 ${cameraView === 'referee' ? 'bg-slate-800 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100'}`}>
               <i className="fas fa-eye text-sm"></i> 裁判視角
             </button>
             <button onClick={() => setCameraView('blue')} className={`px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all flex items-center gap-2 ${cameraView === 'blue' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600 hover:bg-blue-50'}`}>
               <i className="fas fa-shield-alt text-sm"></i> 藍隊視角
             </button>
             <button onClick={() => setCameraView('red')} className={`px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all flex items-center gap-2 ${cameraView === 'red' ? 'bg-red-600 text-white shadow-md' : 'text-slate-600 hover:bg-red-50'}`}>
               <i className="fas fa-shield-alt text-sm"></i> 紅隊視角
             </button>
          </div>
       </div>

       <div className="absolute top-6 right-6 z-10 flex flex-col items-end gap-3 pointer-events-auto">
          <div className="bg-white/90 backdrop-blur-md p-3 rounded-2xl border border-slate-200 shadow-sm w-40 flex flex-col gap-3">
             <div>
                <label className="flex items-center justify-between text-[10px] font-black text-slate-700 uppercase mb-1.5 cursor-pointer">
                   <span className="flex items-center gap-1"><i className="fas fa-wind text-blue-500"></i> 動態側風</span>
                   <input type="checkbox" checked={windEnabled} onChange={(e) => setWindEnabled(e.target.checked)} className="accent-blue-600 w-3 h-3 cursor-pointer" />
                </label>
             </div>
             <div>
                <label className="flex items-center justify-between text-[10px] font-black text-slate-700 uppercase mb-1">
                   <span className="flex items-center gap-1"><i className="fas fa-chart-line text-red-500"></i> 侵略性</span>
                   <span>{aiAggro}%</span>
                </label>
                <input type="range" min="0" max="100" value={aiAggro} onChange={(e) => setAiAggro(Number(e.target.value))} className="w-full accent-red-500 h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer" />
             </div>
             <div className="pt-2 border-t border-slate-100">
                <button 
                   onClick={() => setChaosMode(!chaosMode)}
                   className={`w-full py-1.5 rounded-lg font-black text-[10px] transition-all flex items-center justify-center gap-1.5 shadow-sm border ${
                     chaosMode 
                       ? 'bg-red-500 text-white border-red-400 hover:bg-red-600 shadow-red-500/30' 
                       : 'bg-slate-50 text-slate-600 border-slate-200 hover:bg-slate-100 hover:text-slate-900'
                   }`}
                >
                   <i className={`fas fa-exclamation-triangle ${chaosMode ? 'animate-pulse' : ''}`}></i>
                   {chaosMode ? '恢復正常規則' : '違規飛行模式'}
                </button>
             </div>
          </div>
       </div>

       <div className="absolute top-6 left-1/2 -translate-x-1/2 flex flex-col items-center pointer-events-none z-10">
          <div className="bg-white/95 backdrop-blur-md px-8 py-4 rounded-[2rem] border border-slate-200 shadow-xl flex items-center gap-10">
             <div className="text-center">
                <span className="text-[11px] text-red-600 font-black uppercase tracking-widest block mb-1">RED TEAM</span>
                <span className="text-4xl font-mono text-slate-900 leading-none">{score.red}</span>
             </div>
             
             <div className="flex flex-col items-center px-4">
               <div className="flex items-center gap-2 text-slate-500 mb-1">
                 <i className="fas fa-stopwatch text-sm"></i>
                 <span className="text-[10px] font-black uppercase tracking-widest">TIME</span>
               </div>
               <span className={`text-2xl font-mono font-black ${timeLeft <= 10 ? 'text-red-500 animate-pulse' : 'text-slate-800'}`}>
                 {formatTime(timeLeft)}
               </span>
             </div>

             <div className="text-center">
                <span className="text-[11px] text-blue-600 font-black uppercase tracking-widest block mb-1">BLUE TEAM</span>
                <span className="text-4xl font-mono text-slate-900 leading-none">{score.blue}</span>
             </div>
          </div>
          
          <div className={`mt-4 px-6 py-2 backdrop-blur text-white text-sm font-bold rounded-full shadow-sm transition-colors ${chaosMode ? 'bg-red-600 animate-pulse' : 'bg-slate-800/80'}`}>
            {status}
          </div>
       </div>

       {isSimPaused && (
          <div className="absolute inset-0 flex items-center justify-center bg-blue-900/10 backdrop-blur-[2px] z-20 pointer-events-none">
             <div className="bg-white/95 px-8 py-4 rounded-3xl shadow-2xl border border-blue-200 flex items-center gap-4 animate-in fade-in zoom-in duration-300">
                <i className="fas fa-pause-circle text-4xl text-blue-600 animate-pulse"></i>
                <div>
                   <h2 className="text-3xl font-black text-slate-900 tracking-tighter uppercase italic">戰術講解模式</h2>
                   <p className="text-slate-500 font-bold text-sm">畫面已凍結，可自由切換視角或拖曳球體</p>
                </div>
             </div>
          </div>
       )}

       <div className="absolute bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-200 px-6 py-3 flex flex-wrap items-center justify-between gap-4 pointer-events-auto z-30 shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
          <div className="flex items-center gap-4">
             <button 
               onClick={() => setIsSimPaused(!isSimPaused)}
               className={`flex items-center gap-2 px-4 py-2 rounded-xl font-black text-sm transition-all shadow-sm border ${isSimPaused ? 'bg-blue-600 text-white border-blue-500' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-50'}`}
             >
                <i className={`fas ${isSimPaused ? 'fa-play-circle' : 'fa-pause-circle'} text-lg`}></i>
                {isSimPaused ? '恢復比賽 (Space)' : '戰術暫停 (Space)'}
             </button>
          </div>

          <div className="flex items-center gap-x-6 gap-y-2 pointer-events-none hidden md:flex">
            <div className="flex items-center gap-2">
              <i className="fas fa-fire text-amber-500 text-sm"></i>
              <span className="text-[11px] font-bold text-slate-600 uppercase tracking-wider">光影尾跡/火花</span>
            </div>
            <div className="w-px h-4 bg-slate-300"></div>
            <div className="flex items-center gap-2">
              <i className="fas fa-mouse-pointer text-blue-500 text-sm"></i>
              <span className="text-[11px] font-bold text-slate-600 uppercase tracking-wider">框選拖曳</span>
            </div>
            <div className="flex items-center gap-2">
              <i className="fas fa-keyboard text-emerald-500 text-sm"></i>
              <span className="text-[11px] font-bold text-slate-600 uppercase tracking-wider">單選接管 (IJKL)</span>
            </div>
            <div className="flex items-center gap-2">
              <i className="fas fa-lock text-amber-500 text-sm"></i>
              <span className="text-[11px] font-bold text-slate-600 uppercase tracking-wider">籠子禁閉</span>
            </div>
          </div>
       </div>

       {timeLeft <= 0 && (
         <div className="absolute inset-0 bg-white/60 backdrop-blur-sm flex items-center justify-center z-50">
           <div className="text-center bg-white p-12 rounded-[3rem] border border-slate-200 shadow-2xl">
             <i className="fas fa-trophy text-6xl text-amber-500 mb-6"></i>
             <h2 className="text-5xl font-black text-slate-900 mb-2">比賽結束</h2>
             <p className="text-slate-500 text-lg mb-8">最終比分</p>
             <div className="flex items-center justify-center gap-8 text-4xl font-mono font-black">
               <span className="text-red-600">{score.red}</span>
               <span className="text-slate-400">-</span>
               <span className="text-blue-600">{score.blue}</span>
             </div>
             <button 
               onClick={() => window.location.reload()} 
               className="mt-8 px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-full font-bold transition-all shadow-lg shadow-blue-200"
             >
               重新開始賽事
             </button>
           </div>
         </div>
       )}
    </div>
  );
};
